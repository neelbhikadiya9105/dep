<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Point of Sale - Inventory Avengers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="fas fa-shield-halved"></i>
        <span>Inv</span>Avengers
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="fas fa-gauge-high"></i> Dashboard</a>
        <a href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
        <a href="sales.html" class="active"><i class="fas fa-cash-register"></i> Point of Sale</a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
        <a href="returns.html"><i class="fas fa-rotate-left"></i> Returns</a>
        <a href="approvals.html"><i class="fas fa-clipboard-check"></i> Approvals</a>
      </nav>
      <div class="sidebar-footer"><i class="fas fa-code"></i> Inventory Avengers v1.0</div>
    </aside>

    <div class="main-content">
      <div class="topbar">
        <h1><i class="fas fa-cash-register" style="color:var(--primary);margin-right:8px"></i>Point of Sale</h1>
        <div class="topbar-right">
          <div class="user-info">
            <div class="user-avatar" id="user-avatar">?</div>
            <div>
              <div style="font-weight:600;font-size:0.85rem" id="user-name">Loading...</div>
              <div id="user-role-badge"></div>
            </div>
          </div>
          <button class="btn btn-outline btn-sm" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>

      <div class="page-content" style="padding-bottom:10px">
        <div id="alert-box" style="margin-bottom:10px"></div>

        <div class="pos-layout">
          <!-- Products Panel -->
          <div class="products-panel">
            <div class="products-toolbar">
              <div class="search-input" style="flex:1">
                <i class="fas fa-search"></i>
                <input type="text" id="product-search" class="form-control" placeholder="Search products..." />
              </div>
              <select id="category-filter" class="form-control" style="max-width:150px">
                <option value="">All Categories</option>
              </select>
            </div>
            <div class="products-grid" id="products-grid">
              <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray)">
                <i class="fas fa-spinner fa-spin" style="font-size:2rem"></i>
                <p style="margin-top:10px">Loading products...</p>
              </div>
            </div>
          </div>

          <!-- Cart Panel -->
          <div class="cart-section">
            <div class="cart-header">
              <span><i class="fas fa-shopping-cart" style="color:var(--primary);margin-right:6px"></i>Cart</span>
              <button class="btn btn-outline btn-sm" id="clear-cart-btn"><i class="fas fa-trash"></i> Clear</button>
            </div>

            <div class="cart-items" id="cart-items">
              <div class="cart-empty">
                <i class="fas fa-cart-shopping"></i>
                <p>Cart is empty</p>
                <p style="font-size:0.8rem">Click products to add them</p>
              </div>
            </div>

            <div class="cart-total">
              <div class="total-row">
                <span>Subtotal</span>
                <span id="subtotal">$0.00</span>
              </div>
              <div class="total-row">
                <span>Tax (0%)</span>
                <span>$0.00</span>
              </div>
              <div class="total-row grand">
                <span>Total</span>
                <span id="total">$0.00</span>
              </div>
            </div>

            <div class="checkout-form">
              <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="customer-name" class="form-control" placeholder="Walk-in Customer" />
              </div>
              <div class="form-group">
                <label>Payment Method *</label>
                <select id="payment-method" class="form-control">
                  <option value="cash">Cash</option>
                  <option value="card">Card</option>
                </select>
              </div>
              <button class="btn btn-success" style="width:100%;justify-content:center;padding:12px;font-size:1rem" id="checkout-btn" disabled>
                <i class="fas fa-check-circle"></i> Process Sale
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay hidden" id="success-modal">
    <div class="modal" style="text-align:center;max-width:400px">
      <div style="font-size:4rem;color:var(--success);margin-bottom:15px">
        <i class="fas fa-circle-check"></i>
      </div>
      <h3 style="margin-bottom:10px">Sale Complete!</h3>
      <p style="color:var(--gray);margin-bottom:5px" id="success-customer"></p>
      <p style="font-size:1.5rem;font-weight:700;color:var(--success);margin:15px 0" id="success-amount"></p>
      <p style="color:var(--gray);font-size:0.85rem" id="success-payment"></p>
      <div style="margin-top:20px;display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary" id="new-sale-btn"><i class="fas fa-plus"></i> New Sale</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/sales.js"></script>
</body>
</html>
