<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Returns - Inventory Avengers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="fas fa-shield-halved"></i>
        <span>Inv</span>Avengers
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="fas fa-gauge-high"></i> Dashboard</a>
        <a href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
        <a href="sales.html"><i class="fas fa-cash-register"></i> Point of Sale</a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
        <a href="returns.html" class="active"><i class="fas fa-rotate-left"></i> Returns</a>
        <a href="approvals.html"><i class="fas fa-clipboard-check"></i> Approvals</a>
      </nav>
      <div class="sidebar-footer"><i class="fas fa-code"></i> Inventory Avengers v1.0</div>
    </aside>

    <div class="main-content">
      <div class="topbar">
        <h1><i class="fas fa-rotate-left" style="color:var(--primary);margin-right:8px"></i>Returns & Refunds</h1>
        <div class="topbar-right">
          <div class="user-info">
            <div class="user-avatar" id="user-avatar">?</div>
            <div>
              <div style="font-weight:600;font-size:0.85rem" id="user-name">Loading...</div>
              <div id="user-role-badge"></div>
            </div>
          </div>
          <button class="btn btn-outline btn-sm" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>

      <div class="page-content">
        <div id="alert-box"></div>

        <div style="display:grid;grid-template-columns:400px 1fr;gap:20px;align-items:start">
          <!-- Return Form -->
          <div class="card">
            <div class="section-title" style="margin-bottom:20px"><i class="fas fa-rotate-left" style="color:var(--primary);margin-right:6px"></i>Process Return</div>
            <form id="return-form">
              <div class="form-group">
                <label>Sale Invoice ID *</label>
                <div style="display:flex;gap:8px">
                  <input type="text" id="sale-id-input" class="form-control" placeholder="Enter Sale ID..." />
                  <button type="button" class="btn btn-outline" id="lookup-sale-btn"><i class="fas fa-search"></i></button>
                </div>
              </div>
              <div id="sale-info" style="display:none;margin-bottom:16px">
                <div class="alert alert-info" id="sale-details"></div>
              </div>
              <div class="form-group">
                <label>Product to Return *</label>
                <select id="return-product" class="form-control" required>
                  <option value="">-- Look up sale first --</option>
                </select>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Quantity *</label>
                  <input type="number" id="return-qty" class="form-control" min="1" value="1" required />
                </div>
                <div class="form-group">
                  <label>Refund Amount ($) *</label>
                  <input type="number" id="refund-amount" class="form-control" step="0.01" min="0" placeholder="0.00" required />
                </div>
              </div>
              <div class="form-group">
                <label>Reason *</label>
                <select id="return-reason" class="form-control" required>
                  <option value="">Select reason...</option>
                  <option value="damaged">Damaged</option>
                  <option value="wrong item">Wrong Item</option>
                  <option value="expired">Expired</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <button type="submit" class="btn btn-warning" style="width:100%;justify-content:center" id="submit-return-btn">
                <i class="fas fa-rotate-left"></i> Process Return
              </button>
            </form>
          </div>

          <!-- Recent Returns -->
          <div>
            <div class="section-header">
              <span class="section-title"><i class="fas fa-history" style="color:var(--secondary);margin-right:6px"></i>Recent Returns</span>
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Return ID</th>
                    <th>Sale ID</th>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Reason</th>
                    <th>Refund</th>
                    <th>Processed By</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody id="returns-table">
                  <tr><td colspan="8" class="empty-state"><i class="fas fa-inbox"></i>No returns recorded</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/returns.js"></script>
</body>
</html>
